<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#161616" />
      <stop offset="100%" stop-color="#070707" />
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE082" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Dark aesthetic background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" stroke="#222" stroke-width="6" />
  
  <!-- Outer glowing rings -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#D4AF37" stroke-width="2" stroke-dasharray="10 15" opacity="0.2" />
  <circle cx="256" cy="256" r="140" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-dasharray="5 5" opacity="0.3" />

  <!-- Core Golden Diamond Sparkle Emblem -->
  <g filter="url(#glow)">
    <!-- Main 4-point sparkle path -->
    <path d="M 256 96 C 256 180 180 256 96 256 C 180 256 256 332 256 416 C 256 332 332 256 416 256 C 332 256 256 180 256 96 Z" fill="url(#goldGrad)" />
    
    <!-- Inner bright reflection sparkle -->
    <path d="M 256 140 C 256 200 200 256 140 256 C 200 256 256 312 256 372 C 256 312 312 256 372 256 C 312 256 256 200 256 140 Z" fill="#FFF" opacity="0.4" />
    
    <!-- Central highlight core -->
    <circle cx="256" cy="256" r="24" fill="#FFF" />
  </g>

  <!-- Small accent sparkles -->
  <path d="M 120 120 L 125 125 M 125 120 L 120 125" stroke="#FFE082" stroke-width="4" stroke-linecap="round" opacity="0.8" />
  <path d="M 390 120 L 395 125 M 395 120 L 390 125" stroke="#FFE082" stroke-width="4" stroke-linecap="round" opacity="0.8" />
  <path d="M 120 390 L 125 395 M 125 390 L 120 395" stroke="#FFE082" stroke-width="4" stroke-linecap="round" opacity="0.8" />
  <path d="M 390 390 L 395 395 M 395 390 L 390 395" stroke="#FFE082" stroke-width="4" stroke-linecap="round" opacity="0.8" />
</svg>
